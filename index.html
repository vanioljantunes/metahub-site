<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MetaHub · Sign in</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700;800&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#070a11;--surface:#0d1322;--text:#d4deee;
  --border:rgba(255,255,255,.06);--border-h:rgba(255,255,255,.11);
  --cyan:#00d9b4;
}
*{box-sizing:border-box;}
html,body{margin:0;min-height:100vh;}
body{
  background:var(--bg);
  background-image:radial-gradient(rgba(255,255,255,.05) 1px,transparent 1px);
  background-size:26px 26px;
  font-family:'Outfit',sans-serif;color:var(--text);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;padding:24px;
}
.login-logo{margin-bottom:28px;}
.login-logo img{height:64px;width:auto;}
.login-card{
  width:100%;max-width:520px;
  background:linear-gradient(180deg,rgba(17,24,39,.55),rgba(10,15,26,.75));
  border:1px solid var(--border);border-radius:18px;
  padding:40px 40px 36px;text-align:center;
  box-shadow:0 24px 70px rgba(0,0,0,.5);
  animation:rise .5s cubic-bezier(.22,1,.36,1) both;
}
@keyframes rise{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
.login-title{font-family:'Exo 2',sans-serif;font-size:30px;font-weight:800;color:#fff;margin:0 0 8px;letter-spacing:-.01em;}
.login-sub{font-size:15px;color:rgba(212,222,238,.55);margin:0 0 28px;}
.btn-primary{
  width:100%;display:flex;align-items:center;justify-content:center;gap:12px;
  padding:18px 20px;border-radius:12px;cursor:pointer;
  font-family:'Outfit',sans-serif;font-size:16px;font-weight:600;
  border:1px solid var(--border-h);background:rgba(255,255,255,.03);color:#fff;
  transition:background .16s,border-color .16s,transform .16s;
}
.btn-primary:hover{background:rgba(0,217,180,.08);border-color:rgba(0,217,180,.35);transform:translateY(-1px);}
.btn-primary img{height:24px;width:auto;}
.btn-cyan{
  width:100%;padding:15px;border:none;border-radius:12px;cursor:pointer;
  background:var(--cyan);color:#062b25;font-family:'Outfit',sans-serif;font-size:16px;font-weight:700;
  transition:opacity .16s,transform .16s;box-shadow:0 0 24px rgba(0,217,180,.25);
}
.btn-cyan:hover{opacity:.9;transform:translateY(-1px);}
/* form */
.login-form{display:none;text-align:left;}
.login-form.show{display:block;}
.login-landing.hide{display:none;}
.field{margin-bottom:18px;}
.field label{display:block;font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:rgba(212,222,238,.45);margin-bottom:8px;}
.field input{
  width:100%;padding:15px 16px;border-radius:12px;
  background:rgba(255,255,255,.04);border:1px solid var(--border-h);
  color:#fff;font-family:'Outfit',sans-serif;font-size:15px;outline:none;
  transition:border-color .16s,box-shadow .16s;
}
.field input:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(0,217,180,.15);}
.login-form .btn-cyan{margin-top:6px;}
.login-links{text-align:center;margin-top:18px;}
.login-link{display:block;background:none;border:none;cursor:pointer;font-family:'Outfit',sans-serif;font-size:14px;padding:8px;width:100%;}
.login-link.forgot{color:var(--cyan);font-weight:600;}
.login-link.back{color:rgba(212,222,238,.5);}
.login-link.back:hover{color:#fff;}
.demo-hint{margin-top:14px;text-align:center;font-size:12px;color:rgba(0,217,180,.6);}
.login-foot{margin-top:34px;font-size:12.5px;color:rgba(212,222,238,.3);text-align:center;}
</style>
</head>
<body>
  <div class="login-logo"><img src="assets/logo.png" alt="MetaHub"></div>

  <div class="login-card">
    <h1 class="login-title">Welcome back</h1>
    <p class="login-sub">Sign in with your Meta-Analysis Academy account</p>

    <!-- Landing state -->
    <div class="login-landing" id="loginLanding">
      <button class="btn-primary" onclick="showForm()">
        <img src="assets/logo.png" alt="">
        Login with Meta-Analysis Academy
      </button>
    </div>

    <!-- Form state -->
    <form class="login-form" id="loginForm" onsubmit="return doSignIn(event)">
      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="text" value="user" autocomplete="username">
      </div>
      <div class="field">
        <label for="pass">Password</label>
        <input id="pass" type="password" value="password" autocomplete="current-password">
      </div>
      <button class="btn-cyan" type="submit">Sign in</button>
      <div class="demo-hint">Demo — credentials prefilled (user / password). Just click Sign in.</div>
      <div class="login-links">
        <button class="login-link forgot" type="button" onclick="alert('Demo — password recovery not available here.')">Forgot password?</button>
        <button class="login-link back" type="button" onclick="hideForm()">Back</button>
      </div>
    </form>
  </div>

  <div class="login-foot">© 2026 Meta Analysis Academy. All rights reserved.</div>

<script>
function showForm(){
  document.getElementById('loginLanding').classList.add('hide');
  document.getElementById('loginForm').classList.add('show');
}
function hideForm(){
  document.getElementById('loginForm').classList.remove('show');
  document.getElementById('loginLanding').classList.remove('hide');
}
function doSignIn(e){
  e.preventDefault();
  /* Demo: accept anything, go to the course portal */
  window.location.href='courses.html';
  return false;
}
</script>
</body>
</html>
