<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MetaHub · Your products</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700;800&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#070a11;--surface:#0d1322;--text:#d4deee;
  --border:rgba(255,255,255,.06);--border-h:rgba(255,255,255,.11);--cyan:#00d9b4;
}
*{box-sizing:border-box;}
html,body{margin:0;min-height:100vh;}
body{
  background:var(--bg);
  background-image:radial-gradient(rgba(255,255,255,.04) 1px,transparent 1px);
  background-size:26px 26px;
  font-family:'Outfit',sans-serif;color:var(--text);
}
.top{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 28px;border-bottom:1px solid var(--border);
  position:sticky;top:0;background:rgba(7,10,17,.85);backdrop-filter:blur(14px);z-index:10;
}
.top img{height:34px;width:auto;}
.signout{background:rgba(255,255,255,.04);border:1px solid var(--border-h);color:rgba(255,255,255,.7);
  font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;padding:8px 16px;border-radius:10px;cursor:pointer;}
.signout:hover{color:#fff;background:rgba(255,255,255,.08);}
.wrap{max-width:1280px;margin:0 auto;padding:48px 28px 80px;}
.head{margin-bottom:34px;}
.eyebrow{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:rgba(0,217,180,.7);}
.head h1{font-family:'Exo 2',sans-serif;font-size:clamp(26px,4vw,38px);font-weight:800;color:#fff;margin:8px 0 6px;}
.head p{font-size:15px;color:rgba(212,222,238,.5);margin:0;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:20px;}
.course-card{
  text-align:left;cursor:pointer;border:none;padding:0;background:none;
  display:flex;flex-direction:column;gap:12px;
  transition:transform .18s;
}
.course-card:hover{transform:translateY(-6px);}
.course-art{
  position:relative;border-radius:16px;aspect-ratio:3/4;overflow:hidden;
  border:1px solid var(--border-h);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:24px;text-align:center;
  box-shadow:0 16px 44px rgba(0,0,0,.45);
}
.course-art img{width:64px;height:auto;opacity:.95;}
.course-art .art-title{font-family:'Exo 2',sans-serif;font-weight:800;font-size:20px;line-height:1.1;color:#fff;letter-spacing:.02em;}
.course-badge{position:absolute;top:12px;right:12px;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  padding:4px 9px;border-radius:999px;}
.badge-open{background:rgba(0,217,180,.16);border:1px solid rgba(0,217,180,.4);color:var(--cyan);}
.badge-soon{background:rgba(255,255,255,.06);border:1px solid var(--border-h);color:rgba(255,255,255,.45);}
.course-name{font-size:14.5px;font-weight:600;color:#fff;}
.course-card.soon .course-art{filter:saturate(.7) brightness(.85);}
.course-card.soon{cursor:default;}
.course-card.soon:hover{transform:none;}
/* themes */
.art-mh{background:radial-gradient(circle at 50% 35%,rgba(0,217,180,.18),rgba(7,16,40,.95) 70%);}
.art-mhpt{background:radial-gradient(circle at 50% 35%,rgba(220,232,255,.9),rgba(120,150,210,.75) 70%);}
.art-mhpt .art-title{color:#0d1322;}
.art-mm{background:linear-gradient(160deg,#1a0606,#3a0a0a 55%,#0a0202);}
.art-mm .art-title{color:#ff5b5b;text-shadow:0 0 18px rgba(255,40,40,.5);}
.art-stat{background:linear-gradient(160deg,#0a2a6b,#0d3da8 60%,#06122e);}
@media(max-width:560px){.wrap{padding:32px 16px 60px;}.grid{grid-template-columns:repeat(2,1fr);gap:14px;}}
</style>
</head>
<body>
  <div class="top">
    <img src="assets/logo.png" alt="MetaHub">
    <button class="signout" onclick="window.location.href='index.html'">Sign out</button>
  </div>

  <div class="wrap">
    <div class="head">
      <div class="eyebrow">My courses</div>
      <h1>Choose a product</h1>
      <p>Your Meta-Analysis Academy portal — pick what you want to open.</p>
    </div>

    <div class="grid">
      <button class="course-card" onclick="window.location.href='home.html'">
        <div class="course-art art-mh">
          <span class="course-badge badge-open">Open</span>
          <img src="assets/logo.png" alt="">
          <span class="art-title">MetaHub</span>
        </div>
        <span class="course-name">MetaHub</span>
      </button>

      <button class="course-card" onclick="window.location.href='home.html'">
        <div class="course-art art-mhpt">
          <span class="course-badge badge-open">Open</span>
          <img src="assets/logo.png" alt="">
          <span class="art-title">MetaHub<br>[Portuguese]</span>
        </div>
        <span class="course-name">MetaHub Portuguese</span>
      </button>

      <button class="course-card soon" onclick="alert('Coming soon — not part of this demo.')">
        <div class="course-art art-mm">
          <span class="course-badge badge-soon">Soon</span>
          <span class="art-title">MARCH<br>MADNESS</span>
        </div>
        <span class="course-name">March Madness</span>
      </button>

      <button class="course-card soon" onclick="alert('Coming soon — not part of this demo.')">
        <div class="course-art art-mm">
          <span class="course-badge badge-soon">Soon</span>
          <span class="art-title">MARCH<br>MADNESS</span>
        </div>
        <span class="course-name">March Madness (PT)</span>
      </button>

      <button class="course-card soon" onclick="alert('Coming soon — not part of this demo.')">
        <div class="course-art art-stat">
          <span class="course-badge badge-soon">Soon</span>
          <span class="art-title">Statistical<br>Month</span>
        </div>
        <span class="course-name">June Statistics Month</span>
      </button>

      <button class="course-card soon" onclick="alert('Coming soon — not part of this demo.')">
        <div class="course-art art-stat">
          <span class="course-badge badge-soon">Soon</span>
          <span class="art-title">Mês da<br>Estatística</span>
        </div>
        <span class="course-name">Mês da Estatística</span>
      </button>
    </div>
  </div>
</body>
</html>
